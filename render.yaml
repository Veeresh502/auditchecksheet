services:
  # Backend Web Service
  - type: web
    name: audit-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm run build:prod
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: audit-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CORS_ORIGIN
        value: "*" # Update this with frontend URL after deployment

  # Frontend Static Site
  - type: web
    name: audit-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # User will provide backend URL + /api
      - key: VITE_FILE_SERVER_URL
        sync: false # User will provide backend URL

databases:
  - name: audit-db
    plan: free
    databaseName: audit_system
    user: audit_user
